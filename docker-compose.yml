services:

  python-service:

    build: ./python-service

    env_file:
      - .env

    environment:
      PYTHONUNBUFFERED: 1
      TRANSFORMERS_OFFLINE: 1
      HF_DATASETS_OFFLINE: 1
      # Caps thread pools used by torch/cv2/numpy's BLAS backend. Without this,
      # OCR/embedding calls spin up threads across every core, which is what
      # makes a MacBook's fans spin up during a demo. Bump these (or remove
      # the cpus limit below) if you ever run this on a beefier machine.
      OMP_NUM_THREADS: 2
      MKL_NUM_THREADS: 2
      OPENBLAS_NUM_THREADS: 2

    volumes:
      - uploads_tmp:/app/uploads

    mem_limit: 7500m
    cpus: 3

  node-backend:

    build: ./node-backend

    ports:
      - "2912:2912"

    env_file:
      - .env

    environment:
      NODE_OPTIONS: --max-old-space-size=512

    volumes:
      - uploads_tmp:/app/uploads

    depends_on:
      - python-service

    mem_limit: 1024m

volumes:
  uploads_tmp: